version: '3.8'

services:
  # Python Trading Bot
  alpaca-fleece-py:
    build:
      context: ./py
      dockerfile: Dockerfile
    container_name: alpaca-fleece-py-bot

    env_file:
      - ./py/.env

    environment:
      PYTHONUNBUFFERED: 1
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      ALPACA_PAPER: ${ALPACA_PAPER:-true}
      KILL_SWITCH: ${KILL_SWITCH:-false}
      DATABASE_PATH: ${DATABASE_PATH:-data/trades.db}
      CONFIG_PATH: ${CONFIG_PATH:-config/trading.yaml}

    volumes:
      - alpaca-data-py:/app/data
      - alpaca-logs-py:/app/logs
      - ./py/config/trading.yaml:/app/config/trading.yaml:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "pgrep", "-f", "orchestrator.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # C# Trading Worker
  alpaca-fleece-cs:
    build:
      context: ./cs
      dockerfile: Dockerfile
    container_name: alpaca-fleece-cs-worker

    env_file:
      - ./py/.env

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      TRADING_SYMBOLS: ${TRADING_SYMBOLS:-AAPL,MSFT,GOOGL}
      EXIT_CHECK_INTERVAL_SECONDS: ${EXIT_CHECK_INTERVAL_SECONDS:-30}
      RUNTIME_RECONCILIATION_INTERVAL_SECONDS: ${RUNTIME_RECONCILIATION_INTERVAL_SECONDS:-120}
      DAILY_MAX_TRADES: ${DAILY_MAX_TRADES:-10}
      DAILY_LOSS_LIMIT: ${DAILY_LOSS_LIMIT:-1000.00}

    volumes:
      - alpaca-data-cs:/app/data
      - alpaca-logs-cs:/app/logs

    ports:
      - "8080:8080"  # Health checks endpoint

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  alpaca-data-py:
    driver: local
  alpaca-logs-py:
    driver: local
  alpaca-data-cs:
    driver: local
  alpaca-logs-cs:
    driver: local
