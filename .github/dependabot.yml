version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/py"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # C# NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/cs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "csharp"
